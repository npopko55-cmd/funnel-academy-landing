<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Banner 03 · Case authority</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@1,400;1,500;1,600;1,700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #1f2233; font-family: 'Inter', -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
  .banner {
    width: 1200px; height: 900px; flex-shrink: 0; position: relative; overflow: hidden;
    color: #fff; padding: 90px 110px;
    display: flex; flex-direction: column; justify-content: space-between;
    background:
      radial-gradient(1200px 600px at 85% 15%, rgba(91,111,255,0.42), transparent 60%),
      radial-gradient(900px 600px at 15% 85%, rgba(91,111,255,0.22), transparent 65%),
      linear-gradient(135deg, #0a0e2a 0%, #131a45 45%, #1d2a6e 100%);
    border-radius: 28px;
  }
  .banner::before {
    content: ''; position: absolute; inset: 0; opacity: 0.05; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }
  .italic-serif { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 500; }
  .logo { display: flex; align-items: center; gap: 14px; position: relative; z-index: 2; }
  .logo-mark { width: 46px; height: 46px; background: #fff; color: #0a0e2a; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 26px; }
  .logo-name { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
  .logo-name sup { color: rgba(255,255,255,0.4); font-size: 13px; margin-left: 2px; }
  .eyebrow { font-size: 16px; text-transform: uppercase; letter-spacing: 0.22em; color: rgba(255,255,255,0.55); margin-bottom: 32px; position: relative; z-index: 2; }
  .big-number { font-size: 240px; font-weight: 800; line-height: 1; letter-spacing: -0.04em; position: relative; z-index: 2; }
  .big-number-unit { font-size: 96px; font-weight: 600; color: rgba(255,255,255,0.55); margin-left: 12px; vertical-align: 0.18em; letter-spacing: -0.02em; }
  .number-caption { margin-top: 24px; font-size: 32px; line-height: 1.3; color: rgba(255,255,255,0.78); position: relative; z-index: 2; max-width: 800px; }
  .number-caption .italic-serif { color: #fff; font-weight: 400; }
  .number-caption b { color: #fff; font-weight: 600; }
  .footer { position: relative; z-index: 2; display: flex; align-items: flex-end; justify-content: space-between; gap: 32px; }
  .footer-left { font-size: 18px; line-height: 1.4; max-width: 540px; color: rgba(255,255,255,0.72); }
  .footer-left b { color: #fff; font-weight: 600; }
  .cta { display: inline-flex; align-items: center; gap: 14px; padding: 18px 32px; background: #fff; color: #0a0e2a; border-radius: 999px; font-weight: 700; font-size: 22px; white-space: nowrap; }
  .cta-arrow { width: 28px; height: 28px; border-radius: 50%; background: #0a0e2a; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 16px; }
</style>
</head>
<body>
<div class="banner">

  <div class="logo">
    <div class="logo-mark">F</div>
    <div class="logo-name">Funnel academy<sup>®</sup></div>
  </div>

  <div>
    <div class="eyebrow">Кейс · 2024 год</div>
    <div class="big-number">
      1,26<span class="big-number-unit">млрд ₽</span>
    </div>
    <p class="number-caption">
      <span class="italic-serif">выручка</span> Академии <b>Ukids</b> — за один год. Делюсь подходом, которым я её вывел туда.
    </p>
  </div>

  <div class="footer">
    <div class="footer-left">
      <b>20 минут разбора</b> + 4 темы, в которых плавает 95% маркетологов
    </div>
    <div class="cta">
      @funnel_academy_bot
      <span class="cta-arrow">→</span>
    </div>
  </div>

</div>
</body>
</html>
