<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Banner 04 · CTA offer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@1,400;1,500;1,600;1,700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #1f2233; font-family: 'Inter', -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
  .banner {
    width: 1200px; height: 900px; flex-shrink: 0; position: relative; overflow: hidden;
    color: #fff; padding: 90px 110px;
    display: flex; flex-direction: column; justify-content: space-between;
    background:
      radial-gradient(1200px 600px at 85% 15%, rgba(91,111,255,0.42), transparent 60%),
      radial-gradient(900px 600px at 15% 85%, rgba(91,111,255,0.22), transparent 65%),
      linear-gradient(135deg, #0a0e2a 0%, #131a45 45%, #1d2a6e 100%);
    border-radius: 28px;
  }
  .banner::before {
    content: ''; position: absolute; inset: 0; opacity: 0.05; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }
  .italic-serif { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 500; }
  .logo { display: flex; align-items: center; gap: 14px; position: relative; z-index: 2; }
  .logo-mark { width: 46px; height: 46px; background: #fff; color: #0a0e2a; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 26px; }
  .logo-name { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
  .logo-name sup { color: rgba(255,255,255,0.4); font-size: 13px; margin-left: 2px; }
  .badge { display: inline-flex; align-items: center; gap: 10px; padding: 10px 18px; border-radius: 999px; background: rgba(255,255,255,0.25); border: 1px solid rgba(255,255,255,0.4); font-size: 14px; text-transform: uppercase; letter-spacing: 0.18em; color: #fff; margin-bottom: 32px; backdrop-filter: blur(4px); position: relative; z-index: 2; }
  .h1 { font-size: 124px; font-weight: 700; line-height: 0.96; letter-spacing: -0.025em; position: relative; z-index: 2; }
  .h1 .italic-serif { font-weight: 400; }
  .stats-row { display: flex; gap: 60px; margin-top: 56px; position: relative; z-index: 2; flex-wrap: wrap; }
  .stat { display: flex; flex-direction: column; gap: 8px; }
  .stat-value { font-size: 64px; font-weight: 700; line-height: 1; letter-spacing: -0.02em; }
  .stat-value small { font-size: 36px; color: rgba(255,255,255,0.55); margin-left: 4px; font-weight: 500; }
  .stat-label { font-size: 14px; text-transform: uppercase; letter-spacing: 0.18em; color: rgba(255,255,255,0.55); }
  .footer { position: relative; z-index: 2; display: flex; align-items: flex-end; justify-content: space-between; gap: 32px; }
  .footer-left { font-size: 16px; text-transform: uppercase; letter-spacing: 0.18em; color: rgba(255,255,255,0.55); }
  .cta { display: inline-flex; align-items: center; gap: 14px; padding: 22px 38px; background: #fff; color: #0a0e2a; border-radius: 999px; font-weight: 700; font-size: 26px; }
  .cta-arrow { width: 34px; height: 34px; border-radius: 50%; background: #0a0e2a; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 20px; }
</style>
</head>
<body>
<div class="banner">

  <div class="logo">
    <div class="logo-mark">F</div>
    <div class="logo-name">Funnel academy<sup>®</sup></div>
  </div>

  <div>
    <div class="badge">Бесплатно · только в Telegram</div>
    <div class="h1">
      Фундамент<br />
      <span class="italic-serif">маркетинга</span>,<br />
      которого тебе не дали
    </div>
    <div class="stats-row">
      <div class="stat">
        <div class="stat-value">1<small>урок</small></div>
        <div class="stat-label">видео-разбор</div>
      </div>
      <div class="stat">
        <div class="stat-value">20<small>мин</small></div>
        <div class="stat-label">без воды</div>
      </div>
      <div class="stat">
        <div class="stat-value">4<small>темы</small></div>
        <div class="stat-label">ключевых зоны</div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-left">База знаний Евгения Ли-Юна</div>
    <div class="cta">
      Открыть в Telegram
      <span class="cta-arrow">→</span>
    </div>
  </div>

</div>
</body>
</html>
